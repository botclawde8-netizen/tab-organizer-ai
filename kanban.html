<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Tab Organizer - Kanban</title>
    <link rel="stylesheet" href="kanban.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>AI Tab Organizer</h1>
        <p id="subtitle">Kanban view</p>
      </div>
      <div class="controls">
        <button id="viewToggle" type="button">View: Windows</button>
        <input id="searchInput" type="text" placeholder="Search tabs..." title="Filter tabs by title" />
        <button id="extractBtn" type="button" title="Move matching tabs to new window">Extract</button>
        <div class="group-create">
          <input id="newGroupInput" type="text" placeholder="New group name" />
          <button id="addGroupBtn" type="button">Add</button>
        </div>
        <select id="organiseMode">
          <option value="groups">Create Chrome tab groups</option>
          <option value="windows">Separate into windows</option>
        </select>
        <button id="organiseBtn">Organise</button>
        <label class="mirror-toggle"><input type="checkbox" id="mirrorToggle">Mirror</label>
        <label class="toggle"><input type="checkbox" id="confirmDestructiveToggle"> Confirm Before Changes</label>
        <label class="toggle"><input type="checkbox" id="deleteGroupOnCloseToggle"> Delete Group on Close</label>
        <span id="changeCounter" class="pending-counter">0 pending</span>
        <button id="applyBtn" style="display:none">Apply</button>
        <button id="revertBtn" style="display:none">Revert</button>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2>Drop Group Here To Move Tabs</h2>
        <div id="windowDropList" class="window-drop-list"></div>
      </aside>

      <section id="board" class="board" aria-label="Tab Kanban Board"></section>
    </main>

    <template id="cardTemplate">
      <article class="tab-card" draggable="true">
        <img class="tab-icon" alt="" />
        <div class="tab-content">
          <h3 class="tab-title"></h3>
          <span class="tab-badge"></span>
          <span class="card-close">&times;</span>
        </div>
      </article>
    </template>

    <script src="utils.js"></script>
    <script src="kanban.js"></script>
  </body>
</html>
